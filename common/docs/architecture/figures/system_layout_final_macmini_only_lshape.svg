    <marker id="arrowhead-input" markerWidth="6" markerHeight="4.5" refX="5.5" refY="2.25" orient="auto">
      <polygon points="0 0, 6 2.25, 0 4.5" fill="#334155"/>
    </marker>
    <marker id="arrowhead-op" markerWidth="6" markerHeight="4.5" refX="5.5" refY="2.25" orient="auto">
      <polygon points="0 0, 6 2.25, 0 4.5" fill="#0e7490"/>
    </marker>
    <marker id="arrowhead-exec" markerWidth="6" markerHeight="4.5" refX="5.5" refY="2.25" orient="auto">
      <polygon points="0 0, 6 2.25, 0 4.5" fill="#166534"/>
    </marker>
    <marker id="arrowhead-ack" markerWidth="6" markerHeight="4.5" refX="5.5" refY="2.25" orient="auto">
