  <text x="900" y="42" text-anchor="middle" class="title">Privacy-Aware Edge Smart-Home Architecture with Safe Deferral</text>
  <text x="900" y="68" text-anchor="middle" class="subtitle">Block-only layout draft: Mac mini owns operational authority; Raspberry Pi and STM32 remain non-authoritative experiment and measurement support.</text>

  <rect x="40" y="115" width="340" height="86" class="actor"/>
  <text x="210" y="148" text-anchor="middle" class="area-title">User</text>
  <text x="210" y="172" text-anchor="middle" class="small">bounded input, selection,</text>
  <text x="210" y="190" text-anchor="middle" class="small">and accessible feedback</text>

  <rect x="40" y="230" width="340" height="875" class="actual-area"/>
  <text x="210" y="260" text-anchor="middle" class="area-title">Actual Physical Nodes</text>
  <text x="210" y="281" text-anchor="middle" class="area-note">bounded field-side nodes and interfaces</text>

  <rect x="70" y="315" width="280" height="64" class="actual-block"/>
  <text x="210" y="342" text-anchor="middle" class="label">Bounded Button</text>
  <text x="210" y="361" text-anchor="middle" class="label">Input Node</text>

  <rect x="70" y="405" width="280" height="64" class="actual-block"/>
  <text x="210" y="432" text-anchor="middle" class="label">Environmental</text>
  <text x="210" y="451" text-anchor="middle" class="label">Context Node</text>

  <rect x="70" y="495" width="280" height="64" class="actual-block"/>
  <text x="210" y="522" text-anchor="middle" class="label">Doorbell / Visitor</text>
  <text x="210" y="541" text-anchor="middle" class="label">Context Node</text>

  <rect x="70" y="585" width="280" height="64" class="safe-block"/>
  <text x="210" y="612" text-anchor="middle" class="label">Lighting Control</text>
  <text x="210" y="631" text-anchor="middle" class="label">Node</text>

  <rect x="70" y="675" width="280" height="64" class="experiment-block"/>
  <text x="210" y="702" text-anchor="middle" class="label">Gas / Smoke / Fire</text>
  <text x="210" y="721" text-anchor="middle" class="label">Nodes</text>

  <rect x="70" y="765" width="280" height="64" class="experiment-block"/>
  <text x="210" y="792" text-anchor="middle" class="label">Fall-Detection</text>
  <text x="210" y="811" text-anchor="middle" class="label">Node</text>

  <rect x="70" y="855" width="280" height="64" class="experiment-block"/>
  <text x="210" y="882" text-anchor="middle" class="label">Warning Output</text>
  <text x="210" y="901" text-anchor="middle" class="label">Node</text>

  <rect x="70" y="945" width="280" height="64" class="critical-block"/>
  <text x="210" y="972" text-anchor="middle" class="label">Doorlock</text>
  <text x="210" y="991" text-anchor="middle" class="label">Interface Node</text>

  <rect x="430" y="115" width="780" height="650" class="mac-area"/>
  <text x="820" y="146" text-anchor="middle" class="area-title">Mac mini Operational Hub</text>
  <text x="820" y="167" text-anchor="middle" class="area-note">policy, validation, dispatch, caregiver handling, ACK, and audit</text>

  <rect x="465" y="190" width="220" height="72" class="mac-block"/>
  <text x="575" y="219" text-anchor="middle" class="label">MQTT / Context</text>
  <text x="575" y="238" text-anchor="middle" class="label">Intake</text>

  <rect x="465" y="285" width="220" height="72" class="mac-block"/>
  <text x="575" y="314" text-anchor="middle" class="label">State</text>
  <text x="575" y="333" text-anchor="middle" class="label">Aggregation</text>

  <rect x="465" y="380" width="220" height="72" class="mac-block"/>
  <text x="575" y="409" text-anchor="middle" class="label">Local LLM Adapter</text>
  <text x="575" y="428" text-anchor="middle" class="small">Candidate guidance only</text>

  <rect x="720" y="190" width="220" height="72" class="mac-block"/>
  <text x="830" y="219" text-anchor="middle" class="label">Policy Router</text>
  <text x="830" y="238" text-anchor="middle" class="small">Class 0 / 1 / 2</text>

  <rect x="720" y="285" width="220" height="72" class="safe-block"/>
  <text x="830" y="314" text-anchor="middle" class="label">Deterministic</text>
  <text x="830" y="333" text-anchor="middle" class="label">Validator</text>

