  <text x="830" y="410" text-anchor="middle" class="label">Class 2</text>
  <text x="830" y="429" text-anchor="middle" class="label">Clarification</text>
  <text x="830" y="447" text-anchor="middle" class="label">Manager</text>

  <rect x="720" y="490" width="220" height="72" class="critical-block"/>
  <text x="830" y="519" text-anchor="middle" class="label">Context-Integrity</text>
  <text x="830" y="538" text-anchor="middle" class="label">Safe Deferral</text>

  <rect x="975" y="190" width="200" height="72" class="safe-block"/>
  <text x="1075" y="219" text-anchor="middle" class="label">Low-Risk</text>
  <text x="1075" y="238" text-anchor="middle" class="label">Dispatcher</text>

  <rect x="975" y="300" width="200" height="92" class="critical-block"/>
  <text x="1075" y="329" text-anchor="middle" class="label">Caregiver</text>
  <text x="1075" y="348" text-anchor="middle" class="label">Notification /</text>
  <text x="1075" y="366" text-anchor="middle" class="label">Confirmation</text>

  <rect x="975" y="430" width="200" height="72" class="mac-block"/>
  <text x="1075" y="459" text-anchor="middle" class="label">Read-Only</text>
  <text x="1075" y="478" text-anchor="middle" class="label">Telemetry Adapter</text>

  <rect x="570" y="610" width="230" height="72" class="mac-block"/>
  <text x="685" y="639" text-anchor="middle" class="label">ACK Handler</text>
  <text x="685" y="658" text-anchor="middle" class="small">closed-loop evidence</text>

  <rect x="835" y="610" width="230" height="72" class="mac-block"/>
  <text x="950" y="639" text-anchor="middle" class="label">Audit Logging</text>
  <text x="950" y="658" text-anchor="middle" class="small">single-writer service</text>

  <text x="820" y="730" text-anchor="middle" class="tiny">LLM output, dashboards, MQTT topics, and payload examples do not create execution authority.</text>

  <rect x="1260" y="115" width="470" height="300" class="care-area"/>
  <text x="1495" y="146" text-anchor="middle" class="area-title">Caregiver / Telegram Path</text>
  <text x="1495" y="167" text-anchor="middle" class="area-note">transport and manual confirmation evidence only</text>

  <rect x="1300" y="205" width="180" height="62" class="care-block"/>
  <text x="1390" y="231" text-anchor="middle" class="label">Telegram</text>
  <text x="1390" y="249" text-anchor="middle" class="label">Bot API</text>

  <rect x="1510" y="205" width="180" height="62" class="care-block"/>
  <text x="1600" y="231" text-anchor="middle" class="label">Caregiver</text>
  <text x="1600" y="249" text-anchor="middle" class="small">manual reviewer</text>

  <rect x="1400" y="315" width="230" height="62" class="care-block"/>
  <text x="1515" y="341" text-anchor="middle" class="label">Response /</text>
  <text x="1515" y="359" text-anchor="middle" class="label">Confirmation Evidence</text>

  <rect x="1260" y="455" width="470" height="520" class="rpi-area"/>
  <text x="1495" y="486" text-anchor="middle" class="area-title">Raspberry Pi Experiment Support</text>
  <text x="1495" y="507" text-anchor="middle" class="area-note">non-authoritative simulation, monitoring, governance, and results</text>

  <rect x="1290" y="535" width="190" height="62" class="rpi-block"/>
  <text x="1385" y="561" text-anchor="middle" class="label">Web Experiment</text>
  <text x="1385" y="579" text-anchor="middle" class="label">Dashboard</text>

  <rect x="1505" y="535" width="190" height="62" class="rpi-block"/>
  <text x="1600" y="561" text-anchor="middle" class="label">Experiment</text>
  <text x="1600" y="579" text-anchor="middle" class="label">Manager</text>

  <rect x="1290" y="620" width="190" height="62" class="rpi-block"/>
  <text x="1385" y="646" text-anchor="middle" class="label">Scenario</text>
  <text x="1385" y="664" text-anchor="middle" class="label">Manager</text>

  <rect x="1505" y="620" width="190" height="62" class="rpi-block"/>
  <text x="1600" y="646" text-anchor="middle" class="label">Virtual Node</text>
  <text x="1600" y="664" text-anchor="middle" class="label">Manager</text>

  <rect x="1290" y="705" width="190" height="74" class="rpi-block"/>
  <text x="1385" y="733" text-anchor="middle" class="label">Virtual Behavior /</text>
  <text x="1385" y="751" text-anchor="middle" class="label">Fault Injection</text>

  <rect x="1505" y="705" width="190" height="74" class="rpi-block"/>
  <text x="1600" y="733" text-anchor="middle" class="label">MQTT / Interface</text>
  <text x="1600" y="751" text-anchor="middle" class="label">Status Manager</text>

  <rect x="1290" y="805" width="190" height="62" class="rpi-block"/>
  <text x="1385" y="831" text-anchor="middle" class="label">Result Store /</text>
  <text x="1385" y="849" text-anchor="middle" class="label">Analysis</text>

  <rect x="1505" y="805" width="190" height="62" class="rpi-block"/>
  <text x="1600" y="831" text-anchor="middle" class="label">MQTT / Payload</text>
  <text x="1600" y="849" text-anchor="middle" class="label">Governance Support</text>

  <text x="1495" y="925" text-anchor="middle" class="tiny">RPi tools may run experiments and observe telemetry,</text>
  <text x="1495" y="941" text-anchor="middle" class="tiny">but must not override routing, validation, dispatch, or caregiver authority.</text>

  <rect x="430" y="840" width="780" height="130" class="measure-area"/>
  <text x="820" y="870" text-anchor="middle" class="area-title">STM32 Timing / Measurement Support</text>
  <text x="820" y="891" text-anchor="middle" class="area-note">out-of-band latency evidence and export; not operational control</text>

  <rect x="470" y="915" width="240" height="34" class="measure-block"/>
  <text x="590" y="936" text-anchor="middle" class="label">STM32 Measurement Node</text>

  <rect x="750" y="915" width="190" height="34" class="measure-block"/>
  <text x="845" y="936" text-anchor="middle" class="label">Capture Channels</text>

  <rect x="980" y="915" width="190" height="34" class="measure-block"/>
  <text x="1075" y="936" text-anchor="middle" class="label">Measurement Export</text>

  <rect x="430" y="1000" width="1300" height="105" class="asset-area"/>
  <text x="1080" y="1032" text-anchor="middle" class="area-title">Canonical Assets / Contracts</text>
  <text x="1080" y="1058" text-anchor="middle" class="small">policies, schemas, MQTT registry, payload contracts, scenario contracts, and required experiment definitions</text>
  <text x="1080" y="1078" text-anchor="middle" class="tiny">repository-governed reference layer; not a live operational override channel</text>

