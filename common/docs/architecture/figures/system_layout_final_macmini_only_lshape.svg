<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1800" height="1300" viewBox="0 0 1800 1300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #4b5563; }
      .area-title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .area-note { font: 400 12px Arial, sans-serif; fill: #475569; }
      .label { font: 700 14px Arial, sans-serif; fill: #111827; }
      .small { font: 400 12px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 11px Arial, sans-serif; fill: #475569; }
      .actor { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 14; ry: 14; }
      .actual-area { fill: #f8fafc; stroke: #0f172a; stroke-width: 2.4; rx: 22; ry: 22; }
      .actual-block { fill: #ffffff; stroke: #334155; stroke-width: 1.8; rx: 12; ry: 12; }
      .experiment-area { fill: #f5f3ff; stroke: #6d28d9; stroke-width: 2.2; rx: 22; ry: 22; }
      .experiment-block { fill: #ffffff; stroke: #7c3aed; stroke-width: 1.8; rx: 12; ry: 12; }
      .mac-area { fill: #ecfeff; stroke: #155e75; stroke-width: 2.6; rx: 24; ry: 24; }
      .mac-block { fill: #ffffff; stroke: #0e7490; stroke-width: 1.8; rx: 12; ry: 12; }
      .safe-block { fill: #f0fdf4; stroke: #166534; stroke-width: 1.8; rx: 12; ry: 12; }
      .critical-block { fill: #fff7ed; stroke: #9a3412; stroke-width: 1.8; rx: 12; ry: 12; }
      .care-area { fill: #fff7ed; stroke: #9a3412; stroke-width: 2.2; rx: 22; ry: 22; }
      .care-block { fill: #ffffff; stroke: #c2410c; stroke-width: 1.8; rx: 12; ry: 12; }
      .rpi-area { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2.2; rx: 22; ry: 22; }
      .rpi-block { fill: #ffffff; stroke: #2563eb; stroke-width: 1.8; rx: 12; ry: 12; }
      .measure-area { fill: #f8fafc; stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 8 6; rx: 22; ry: 22; }
      .measure-block { fill: #ffffff; stroke: #64748b; stroke-width: 1.8; stroke-dasharray: 6 4; rx: 12; ry: 12; }
      .asset-area { fill: #f9fafb; stroke: #6b7280; stroke-width: 1.8; rx: 16; ry: 16; }
      .footer { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.6; rx: 10; ry: 10; }
      .arrow { fill: none; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
      .input-arrow { stroke: #334155; marker-end: url(#arrowhead-input); }
      .op-arrow { stroke: #0e7490; marker-end: url(#arrowhead-op); }
      .exec-arrow { stroke: #166534; marker-end: url(#arrowhead-exec); }
      .ack-arrow { stroke: #475569; stroke-dasharray: 6 4; marker-end: url(#arrowhead-ack); }
      .class2-arrow { stroke: #9a3412; marker-end: url(#arrowhead-class2); }
      .care-arrow { stroke: #c2410c; stroke-dasharray: 7 5; marker-end: url(#arrowhead-care); }
      .manual-arrow { stroke: #7c2d12; marker-end: url(#arrowhead-manual); }
      .flow-label { font: 700 11px Arial, sans-serif; fill: #334155; }
