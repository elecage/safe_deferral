  <path d="M685 321 H705 V226 H720" class="arrow op-arrow"/>
  <path d="M830 262 V285" class="arrow op-arrow"/>
  <path d="M940 321 H955 V226 H975" class="arrow op-arrow"/>
  <text x="812" y="179" text-anchor="middle" class="flow-label">operational routing</text>

  <path d="M1175 226 H1225 V795 H400 V617 H350" class="arrow exec-arrow"/>
  <text x="1020" y="786" text-anchor="middle" class="flow-label">approved low-risk dispatch</text>

  <path d="M350 638 H405 V646 H570" class="arrow ack-arrow"/>
  <path d="M800 646 H835" class="arrow ack-arrow"/>
  <text x="492" y="666" text-anchor="middle" class="flow-label">ACK evidence</text>

  <path d="M940 238 H950 V423 H940" class="arrow class2-arrow"/>
  <text x="967" y="412" text-anchor="middle" class="flow-label">Class 2 branch</text>

  <path d="M940 438 H960 V346 H975" class="arrow class2-arrow"/>
  <path d="M1175 346 H1240 V236 H1300" class="arrow care-arrow"/>
  <path d="M1480 236 H1510" class="arrow care-arrow"/>
  <path d="M1600 267 V291 H1515 V315" class="arrow care-arrow"/>
  <path d="M1400 362 H1175" class="arrow care-arrow"/>
  <text x="1264" y="222" text-anchor="middle" class="flow-label">notification</text>
  <text x="1286" y="384" text-anchor="middle" class="flow-label">confirmation response</text>

  <path d="M1175 376 H1235 V977 H350" class="arrow manual-arrow"/>
  <text x="858" y="965" text-anchor="middle" class="flow-label">governed manual dispatch after Mac mini checks</text>
  <path d="M1075 392 V410 H1192 V590 H950 V610" class="arrow care-arrow"/>
  <text x="1104" y="584" text-anchor="middle" class="flow-label">confirmation audit</text>

  <rect x="40" y="1245" width="1720" height="36" class="footer"/>
  <text x="900" y="1268" text-anchor="middle" class="tiny">Step 5 caregiver flow: Telegram transports notification/response only; Mac mini performs governed manual dispatch and audit handling.</text>
