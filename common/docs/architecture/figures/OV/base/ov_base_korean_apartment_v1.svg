<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Canonical Korean apartment base background for OV figures">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7F5F0"/>
      <stop offset="1" stop-color="#ECE8DF"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#F1EBDD"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <pattern id="wood" width="32" height="32" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <rect width="32" height="32" fill="#F3E7D3"/>
      <path d="M0 16h32" stroke="#E3D2B8" stroke-width="2" opacity="0.55"/>
    </pattern>
    <pattern id="tile" width="42" height="42" patternUnits="userSpaceOnUse">
      <rect width="42" height="42" fill="#E9EEF0"/>
      <path d="M42 0H0v42" fill="none" stroke="#CAD4D8" stroke-width="1" opacity="0.8"/>
    </pattern>
  </defs>

  <!-- Background: no text labels; all scenario labels must be added as overlays. -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Subtle right-side empty panel area reserved for future overlays. -->
  <rect x="1280" y="90" width="520" height="850" rx="28" fill="#F5F5F5" opacity="0.38" stroke="#D9D9D9" stroke-width="2" stroke-dasharray="10 14"/>

  <!-- Apartment shell, semi-isometric feel using simple technical illustration geometry. -->
  <g id="apartment_base" filter="url(#softShadow)">
    <!-- Main apartment floor plate -->
    <path d="M190 250 L990 145 L1245 310 L1245 835 L410 930 L190 760 Z" fill="url(#floor)" stroke="#C9BFAE" stroke-width="6"/>

    <!-- Entrance zone -->
    <path d="M190 250 L410 222 L520 315 L315 350 Z" fill="#E8E2D6" stroke="#C9BFAE" stroke-width="4"/>
    <path d="M206 314 L314 300 L376 347 L270 363 Z" fill="url(#tile)" opacity="0.85" stroke="#CCD2D4" stroke-width="2"/>
    <path d="M220 254 L318 241 L318 318 L220 332 Z" fill="#BFAE99" stroke="#7D6A55" stroke-width="4"/>
    <path d="M318 241 L350 259 L350 334 L318 318 Z" fill="#A99379" stroke="#7D6A55" stroke-width="3"/>

    <!-- Living room zone -->
    <path d="M390 350 L845 300 L1048 430 L1038 760 L458 828 L315 698 L315 432 Z" fill="url(#wood)" stroke="#D5C6B2" stroke-width="4"/>
    <path d="M508 520 L760 493 L874 565 L618 598 Z" fill="#DED2C1" stroke="#BFAE99" stroke-width="3" opacity="0.9"/>
    <path d="M575 612 L810 584 L906 648 L670 678 Z" fill="#EFE4D3" stroke="#C9BFAE" stroke-width="3"/>
    <path d="M870 350 L1025 332 L1100 380 L944 400 Z" fill="#D9D1C5" stroke="#BFAE99" stroke-width="3" opacity="0.8"/>
    <path d="M910 330 L1112 302 L1112 340 L910 368 Z" fill="#2F3A44" opacity="0.28" stroke="#697882" stroke-width="3"/>

    <!-- Kitchen zone -->
    <path d="M845 300 L990 145 L1245 310 L1048 430 Z" fill="#EFEFE8" stroke="#C9BFAE" stroke-width="4"/>
    <path d="M986 232 L1168 306 L1102 355 L924 284 Z" fill="url(#tile)" opacity="0.85" stroke="#CAD4D8" stroke-width="2"/>
    <path d="M1008 171 L1215 304 L1180 328 L972 199 Z" fill="#D6CDC0" stroke="#AFA392" stroke-width="3"/>
    <circle cx="1090" cy="276" r="18" fill="#BFC8CC" stroke="#87969C" stroke-width="3"/>
    <circle cx="1140" cy="303" r="18" fill="#BFC8CC" stroke="#87969C" stroke-width="3"/>

    <!-- Bedroom zone -->
    <path d="M190 760 L315 698 L458 828 L410 930 Z" fill="#EEE6DA" stroke="#C9BFAE" stroke-width="4"/>
    <path d="M245 760 L350 710 L425 785 L316 840 Z" fill="#D7E1E8" stroke="#A5B7C2" stroke-width="3"/>
    <path d="M276 740 L340 710 L377 747 L312 780 Z" fill="#F6F4ED" stroke="#C9BFAE" stroke-width="2"/>

    <!-- Bathroom zone -->
    <path d="M315 432 L390 350 L315 698 L190 760 L190 510 Z" fill="#E7EEF0" stroke="#C9BFAE" stroke-width="4"/>
    <path d="M218 532 L325 486 L305 610 L215 653 Z" fill="url(#tile)" opacity="0.82" stroke="#CAD4D8" stroke-width="2"/>
    <ellipse cx="276" cy="570" rx="38" ry="24" fill="#F6FAFA" stroke="#AFC2C8" stroke-width="3" transform="rotate(-20 276 570)"/>

    <!-- Balcony zone -->
    <path d="M1038 760 L1245 835 L1245 310 L1048 430 Z" fill="#E8F1F1" stroke="#B8C9C9" stroke-width="4" opacity="0.92"/>
    <path d="M1080 520 L1218 470" stroke="#94ACAC" stroke-width="5" opacity="0.75"/>
    <path d="M1080 620 L1218 570" stroke="#94ACAC" stroke-width="5" opacity="0.75"/>
    <path d="M1080 720 L1218 670" stroke="#94ACAC" stroke-width="5" opacity="0.75"/>

    <!-- Interior walls -->
    <path d="M390 350 L315 698" stroke="#B9AE9D" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
    <path d="M845 300 L1048 430" stroke="#B9AE9D" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
    <path d="M1048 430 L1038 760" stroke="#B9AE9D" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
    <path d="M315 432 L520 315" stroke="#B9AE9D" stroke-width="7" stroke-linecap="round" opacity="0.82"/>

    <!-- Windows / balcony glass -->
    <path d="M1112 430 L1234 385 L1234 780 L1112 820 Z" fill="#BFDCE2" opacity="0.28" stroke="#86AEB7" stroke-width="3"/>
    <path d="M1112 520 L1234 477" stroke="#86AEB7" stroke-width="2" opacity="0.6"/>
    <path d="M1112 620 L1234 577" stroke="#86AEB7" stroke-width="2" opacity="0.6"/>

    <!-- Low-contrast neutral IoT mounting placeholders without labels -->
    <g id="neutral_node_placeholders" opacity="0.58">
      <circle cx="420" cy="690" r="14" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="4"/>
      <circle cx="760" cy="410" r="14" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="4"/>
      <circle cx="260" cy="420" r="14" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="4"/>
      <circle cx="720" cy="350" r="14" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="4"/>
      <circle cx="780" cy="300" r="14" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="4"/>
      <circle cx="820" cy="560" r="14" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="4"/>
      <circle cx="610" cy="720" r="14" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="4"/>
      <circle cx="1120" cy="310" r="14" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="4"/>
      <circle cx="1080" cy="650" r="14" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="4"/>
      <circle cx="1220" cy="620" r="14" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="4"/>
      <circle cx="1260" cy="360" r="14" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="4"/>
    </g>

    <!-- Mac mini / network area placeholder, no label -->
    <rect x="925" y="585" width="80" height="36" rx="10" fill="#E7E7E7" stroke="#9E9E9E" stroke-width="3" opacity="0.85"/>
  </g>

  <!-- Empty lower strip reserved for future overlay metadata/legend. No text embedded. -->
  <rect x="120" y="970" width="1680" height="62" rx="20" fill="#FFFFFF" opacity="0.46" stroke="#D0D0D0" stroke-width="2" stroke-dasharray="8 12"/>
</svg>
