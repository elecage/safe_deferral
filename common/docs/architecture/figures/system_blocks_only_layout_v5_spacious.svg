<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1660" height="1180" viewBox="0 0 1660 1180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #4b5563; }
      .host { fill: #f8fafc; stroke: #0f172a; stroke-width: 2.5; rx: 24; ry: 24; }
      .actor { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 18; ry: 18; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 16; ry: 16; }
      .safe { fill: #f0fdf4; stroke: #166534; stroke-width: 2; rx: 16; ry: 16; }
      .critical { fill: #fff7ed; stroke: #9a3412; stroke-width: 2; rx: 16; ry: 16; }
      .tts { fill: #faf5ff; stroke: #7c3aed; stroke-width: 2; rx: 16; ry: 16; }
      .exp { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 16; ry: 16; }
      .section { font: 700 18px Arial, sans-serif; fill: #111827; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #4b5563; }
      .label { font: 600 15px Arial, sans-serif; fill: #111827; }
      .small { font: 400 13px Arial, sans-serif; fill: #374151; }
    </style>
  </defs>

  <text x="830" y="42" text-anchor="middle" class="title">System Block Layout for the Proposed Assistive Smart Home</text>
  <text x="830" y="68" text-anchor="middle" class="subtitle">
    spacious block-only layout for validating containment, spacing, and future interface-routing gutters
  </text>

  <!-- External actors aligned in width with lower hosts -->
  <rect x="50" y="90" width="330" height="88" class="actor"/>
  <text x="215" y="121" text-anchor="middle" class="section">User</text>
  <text x="215" y="146" text-anchor="middle" class="small">bounded input and</text>
  <text x="215" y="166" text-anchor="middle" class="small">voice-guided interaction</text>

  <rect x="1300" y="90" width="310" height="88" class="actor"/>
  <text x="1455" y="121" text-anchor="middle" class="section">Caregiver</text>
  <text x="1455" y="146" text-anchor="middle" class="small">approval authority for</text>
  <text x="1455" y="166" text-anchor="middle" class="small">sensitive actuation</text>

  <!-- ESP32 host -->
  <rect x="50" y="200" width="330" height="900" class="host"/>
  <text x="215" y="232" text-anchor="middle" class="section">ESP32 Device Layer</text>
  <text x="215" y="255" text-anchor="middle" class="tiny">field-side bounded input, sensing,</text>
  <text x="215" y="271" text-anchor="middle" class="tiny">emergency detection, and</text>
  <text x="215" y="287" text-anchor="middle" class="tiny">actuator interfacing</text>

  <rect x="85" y="330" width="260" height="96" class="box"/>
  <text x="215" y="362" text-anchor="middle" class="label">Bounded Input Node</text>
  <text x="215" y="388" text-anchor="middle" class="small">button and</text>
  <text x="215" y="408" text-anchor="middle" class="small">alternative input</text>

  <rect x="85" y="485" width="260" height="106" class="box"/>
  <text x="215" y="517" text-anchor="middle" class="label">Context Nodes</text>
  <text x="215" y="543" text-anchor="middle" class="small">environment and</text>
  <text x="215" y="563" text-anchor="middle" class="small">device-state sensing</text>

  <rect x="85" y="650" width="260" height="110" class="critical"/>
  <text x="215" y="682" text-anchor="middle" class="label">Emergency Nodes</text>
  <text x="215" y="708" text-anchor="middle" class="small">gas, smoke, fall, and</text>
  <text x="215" y="728" text-anchor="middle" class="small">threshold emergency</text>
  <text x="215" y="748" text-anchor="middle" class="small">signals</text>

  <rect x="85" y="820" width="260" height="110" class="critical"/>
  <text x="215" y="852" text-anchor="middle" class="label">Actuator Interface Nodes</text>
  <text x="215" y="878" text-anchor="middle" class="small">lighting and representative</text>
  <text x="215" y="898" text-anchor="middle" class="small">doorlock-sensitive path</text>

  <!-- Mac mini host -->
  <rect x="420" y="200" width="840" height="900" class="host"/>
  <text x="840" y="232" text-anchor="middle" class="section">Mac mini Edge Hub</text>
  <text x="840" y="255" text-anchor="middle" class="tiny">local LLM reasoning, policy-constrained control, TTS rendering, ACK handling, and local audit</text>

  <!-- left column -->
  <rect x="465" y="310" width="300" height="96" class="box"/>
  <text x="615" y="342" text-anchor="middle" class="label">MQTT Ingestion / State Intake</text>
  <text x="615" y="368" text-anchor="middle" class="small">receives field-side input,</text>
  <text x="615" y="388" text-anchor="middle" class="small">state, emergency, and ACK events</text>

  <rect x="465" y="470" width="300" height="110" class="box"/>
  <text x="615" y="502" text-anchor="middle" class="label">Context and Runtime</text>
  <text x="615" y="522" text-anchor="middle" class="label">State Aggregation</text>
  <text x="615" y="548" text-anchor="middle" class="small">bounded input, context, and</text>
  <text x="615" y="568" text-anchor="middle" class="small">runtime-state integration</text>

  <rect x="465" y="645" width="300" height="126" class="box"/>
  <text x="615" y="677" text-anchor="middle" class="label">Local LLM Reasoning Layer</text>
  <text x="615" y="703" text-anchor="middle" class="small">intent recovery, explanation</text>
  <text x="615" y="723" text-anchor="middle" class="small">generation, and clarification</text>
  <text x="615" y="743" text-anchor="middle" class="small">prompt generation</text>

  <rect x="465" y="835" width="300" height="96" class="tts"/>
  <text x="615" y="867" text-anchor="middle" class="label">TTS Rendering / Voice Output</text>
  <text x="615" y="893" text-anchor="middle" class="small">spoken guidance, status,</text>
  <text x="615" y="913" text-anchor="middle" class="small">warning, and next-input prompts</text>

  <!-- right column -->
  <rect x="915" y="310" width="300" height="96" class="box"/>
  <text x="1065" y="342" text-anchor="middle" class="label">Policy Routing + Validation</text>
  <text x="1065" y="368" text-anchor="middle" class="small">deterministic authority for</text>
  <text x="1065" y="388" text-anchor="middle" class="small">routing and admissibility</text>

  <rect x="915" y="470" width="300" height="106" class="safe"/>
  <text x="1065" y="502" text-anchor="middle" class="label">Approved Low-Risk</text>
  <text x="1065" y="522" text-anchor="middle" class="label">Actuation Path</text>
  <text x="1065" y="548" text-anchor="middle" class="small">bounded execution for</text>
  <text x="1065" y="568" text-anchor="middle" class="small">admissible low-risk actions</text>

  <rect x="915" y="640" width="300" height="126" class="critical"/>
  <text x="1065" y="672" text-anchor="middle" class="label">Safe Deferral and</text>
  <text x="1065" y="692" text-anchor="middle" class="label">Clarification Management</text>
  <text x="1065" y="718" text-anchor="middle" class="small">deferred state, unresolved</text>
  <text x="1065" y="738" text-anchor="middle" class="small">reason, and clarification-needed</text>

  <rect x="915" y="830" width="300" height="101" class="critical"/>
  <text x="1065" y="862" text-anchor="middle" class="label">Caregiver Escalation</text>
  <text x="1065" y="888" text-anchor="middle" class="small">manual confirmation path for</text>
  <text x="1065" y="908" text-anchor="middle" class="small">sensitive actuation</text>

  <!-- bottom full-width audit inside Mac mini -->
  <rect x="465" y="980" width="750" height="70" class="box"/>
  <text x="840" y="1012" text-anchor="middle" class="label">Local ACK + Audit Logging</text>
  <text x="840" y="1038" text-anchor="middle" class="small">shared lower layer for processed hub-side outcomes</text>

  <!-- Raspberry Pi host -->
  <rect x="1300" y="200" width="310" height="900" class="host"/>
  <text x="1455" y="232" text-anchor="middle" class="section">Raspberry Pi 5</text>
  <text x="1455" y="255" text-anchor="middle" class="tiny">scenario orchestration, replay,</text>
  <text x="1455" y="271" text-anchor="middle" class="tiny">fault injection, and</text>
  <text x="1455" y="287" text-anchor="middle" class="tiny">result publication</text>

  <rect x="1340" y="430" width="230" height="120" class="exp"/>
  <text x="1455" y="462" text-anchor="middle" class="label">Experiment Support</text>
  <text x="1455" y="488" text-anchor="middle" class="small">scenario orchestration, replay,</text>
  <text x="1455" y="508" text-anchor="middle" class="small">simulation, and fault injection</text>

  <rect x="1340" y="630" width="230" height="96" class="exp"/>
  <text x="1455" y="662" text-anchor="middle" class="label">Progress / Result Publication</text>
  <text x="1455" y="688" text-anchor="middle" class="small">progress visibility and</text>
  <text x="1455" y="708" text-anchor="middle" class="small">experiment artifacts</text>

  <!-- Caregiver approval block -->
  <rect x="1320" y="830" width="270" height="88" class="critical"/>
  <text x="1455" y="862" text-anchor="middle" class="label">Caregiver Approval</text>
  <text x="1455" y="888" text-anchor="middle" class="small">approval or denial of</text>
  <text x="1455" y="908" text-anchor="middle" class="small">sensitive action requests</text>

  <!-- footer note -->
  <rect x="60" y="1135" width="1550" height="24" class="box"/>
  <text x="835" y="1152" text-anchor="middle" class="tiny">Block-only layout: no interfaces are drawn in this version. Extra vertical spacing is intentionally reserved for future interface-routing gutters.</text>
</svg>
