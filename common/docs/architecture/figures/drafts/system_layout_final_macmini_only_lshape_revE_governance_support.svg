<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1650" height="1240" viewBox="0 0 1650 1240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #4b5563; }
      .hostfill { fill: #f8fafc; }
      .hoststroke { fill: none; stroke: #0f172a; stroke-width: 2.5; stroke-linejoin: round; stroke-linecap: round; }
      .actor { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 18; ry: 18; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 16; ry: 16; }
      .safe { fill: #f0fdf4; stroke: #166534; stroke-width: 2; rx: 16; ry: 16; }
      .critical { fill: #fff7ed; stroke: #9a3412; stroke-width: 2; rx: 16; ry: 16; }
      .tts { fill: #faf5ff; stroke: #7c3aed; stroke-width: 2; rx: 16; ry: 16; }
      .exp { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 16; ry: 16; }
      .section { font: 700 18px Arial, sans-serif; fill: #111827; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #4b5563; }
      .label { font: 600 15px Arial, sans-serif; fill: #111827; }
      .small { font: 400 13px Arial, sans-serif; fill: #374151; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .divider { stroke: #cbd5e1; stroke-width: 1.5; }
      .emergency { stroke: #9a3412; }
      .llm { stroke: #0f766e; }
      .branch { stroke: #1d4ed8; }
      .exec { stroke: #7c2d12; }
      .ttsflow { stroke: #7c3aed; }
      .ack { stroke: #0f766e; }
    </style>
    <marker id="arrowhead" markerWidth="7" markerHeight="5" refX="6.2" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#334155"/></marker>
    <marker id="arrowhead_em" markerWidth="7" markerHeight="5" refX="6.2" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#9a3412"/></marker>
    <marker id="arrowhead_llm" markerWidth="7" markerHeight="5" refX="6.2" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#0f766e"/></marker>
    <marker id="arrowhead_branch" markerWidth="7" markerHeight="5" refX="6.2" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#1d4ed8"/></marker>
    <marker id="arrowhead_exec" markerWidth="7" markerHeight="5" refX="6.2" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#7c2d12"/></marker>
    <marker id="arrowhead_tts" markerWidth="7" markerHeight="5" refX="6.2" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#7c3aed"/></marker>
    <marker id="arrowhead_ack" markerWidth="7" markerHeight="5" refX="6.2" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#0f766e"/></marker>
  </defs>

  <text x="825" y="42" text-anchor="middle" class="title">Privacy-Aware Edge Smart-Home Architecture with Safe Deferral</text>
  <text x="825" y="68" text-anchor="middle" class="subtitle">Mac mini hosts local reasoning, deterministic validation, caregiver-mediated sensitive actuation, TTS, ACK handling, and audit logging; Raspberry Pi provides non-authoritative experiment and monitoring support.</text>

  <rect x="50" y="90" width="330" height="88" class="actor"/>
  <text x="215" y="121" text-anchor="middle" class="section">User</text>
  <text x="215" y="146" text-anchor="middle" class="small">bounded input and</text>
  <text x="215" y="166" text-anchor="middle" class="small">voice-guided interaction</text>

  <rect x="1210" y="90" width="310" height="88" class="actor"/>
  <text x="1365" y="121" text-anchor="middle" class="section">Caregiver</text>
  <text x="1365" y="146" text-anchor="middle" class="small">approval authority for</text>
  <text x="1365" y="166" text-anchor="middle" class="small">sensitive actuation</text>

  <rect x="50" y="200" width="330" height="980" fill="#f8fafc" stroke="#0f172a" stroke-width="2.5" rx="24" ry="24"/>
  <rect x="85" y="290" width="260" height="96" class="box"/>
  <text x="215" y="322" text-anchor="middle" class="label">Bounded Input Node</text>
  <text x="215" y="348" text-anchor="middle" class="small">button and</text>
  <text x="215" y="368" text-anchor="middle" class="small">alternative input</text>
  <rect x="85" y="470" width="260" height="110" class="box"/>
  <text x="215" y="502" text-anchor="middle" class="label">Context Nodes</text>
  <text x="215" y="528" text-anchor="middle" class="small">environment and</text>
  <text x="215" y="548" text-anchor="middle" class="small">device-state sensing</text>
  <rect x="85" y="650" width="260" height="126" class="critical"/>
  <text x="215" y="682" text-anchor="middle" class="label">Emergency Nodes</text>
  <text x="215" y="708" text-anchor="middle" class="small">gas, smoke, fall, and</text>
  <text x="215" y="728" text-anchor="middle" class="small">threshold emergency</text>
  <text x="215" y="748" text-anchor="middle" class="small">signals</text>
  <rect x="85" y="840" width="260" height="96" class="critical"/>
  <text x="215" y="872" text-anchor="middle" class="label">Actuator Interface Nodes</text>
  <text x="215" y="898" text-anchor="middle" class="small">lighting and governed</text>
  <text x="215" y="918" text-anchor="middle" class="small">sensitive-action interface</text>
  <line x1="70" y1="1040" x2="360" y2="1040" class="divider"/>
  <text x="215" y="1085" text-anchor="middle" class="section">ESP32 Device Layer</text>
  <text x="215" y="1110" text-anchor="middle" class="tiny">field-side bounded input, sensing,</text>
  <text x="215" y="1126" text-anchor="middle" class="tiny">emergency detection, and</text>
  <text x="215" y="1142" text-anchor="middle" class="tiny">bounded actuator interfacing</text>

  <path class="hostfill" d="
    M420,224
    Q420,200 444,200
    L1236,200
    Q1260,200 1260,224
    L1260,806
    L1496,806
    Q1520,806 1520,830
    L1520,1156
    Q1520,1180 1496,1180
    L444,1180
    Q420,1180 420,1156
    Z"/>
  <path class="hoststroke" d="
    M444,200
    L1236,200
    Q1260,200 1260,224
    L1260,806
    L1496,806
    Q1520,806 1520,830
    L1520,1156
    Q1520,1180 1496,1180
    L444,1180
    Q420,1180 420,1156
    L420,224
    Q420,200 444,200
    Z"/>

  <rect x="1270" y="200" width="250" height="595" fill="#f8fafc" stroke="#0f172a" stroke-width="2.5" rx="24" ry="24"/>
  <rect x="1290" y="290" width="210" height="130" class="exp"/>
  <text x="1395" y="322" text-anchor="middle" class="label">Monitoring / Experiment</text>
  <text x="1395" y="342" text-anchor="middle" class="label">Dashboard</text>
  <text x="1395" y="368" text-anchor="middle" class="small">runtime status, event view,</text>
  <text x="1395" y="388" text-anchor="middle" class="small">approval-status visibility only,</text>
  <text x="1395" y="408" text-anchor="middle" class="small">and experiment monitoring</text>
  <rect x="1290" y="455" width="210" height="110" class="exp"/>
  <text x="1395" y="487" text-anchor="middle" class="label">Experiment Support</text>
  <text x="1395" y="513" text-anchor="middle" class="small">scenario orchestration, replay,</text>
  <text x="1395" y="533" text-anchor="middle" class="small">simulation, and fault injection</text>
  <rect x="1290" y="595" width="210" height="98" class="exp"/>
  <text x="1395" y="621" text-anchor="middle" class="label">Progress / Result /</text>
  <text x="1395" y="641" text-anchor="middle" class="label">Governance Reports</text>
  <text x="1395" y="663" text-anchor="middle" class="small">progress, summaries,</text>
  <text x="1395" y="681" text-anchor="middle" class="small">validation reports, and artifacts</text>
  <line x1="1282" y1="716" x2="1508" y2="716" class="divider"/>
  <text x="1395" y="742" text-anchor="middle" class="section">Raspberry Pi 5</text>
  <text x="1395" y="760" text-anchor="middle" class="tiny">non-authoritative monitoring,</text>
  <text x="1395" y="776" text-anchor="middle" class="tiny">orchestration, governance checks,</text>
  <text x="1395" y="792" text-anchor="middle" class="tiny">and result publication</text>

  <rect x="465" y="290" width="300" height="96" class="box"/>
  <text x="615" y="322" text-anchor="middle" class="label">MQTT Ingestion / State Intake</text>
  <text x="615" y="348" text-anchor="middle" class="small">receives field-side input,</text>
  <text x="615" y="368" text-anchor="middle" class="small">state, emergency, and ACK events</text>
  <rect x="465" y="470" width="300" height="110" class="box"/>
  <text x="615" y="502" text-anchor="middle" class="label">Context and Runtime</text>
  <text x="615" y="522" text-anchor="middle" class="label">State Aggregation</text>
  <text x="615" y="548" text-anchor="middle" class="small">bounded input, context, and</text>
  <text x="615" y="568" text-anchor="middle" class="small">runtime-state integration</text>
  <rect x="465" y="650" width="300" height="126" class="box"/>
  <text x="615" y="682" text-anchor="middle" class="label">Local LLM Reasoning Layer</text>
  <text x="615" y="708" text-anchor="middle" class="small">intent recovery, explanation</text>
  <text x="615" y="728" text-anchor="middle" class="small">generation, and clarification</text>
  <text x="615" y="748" text-anchor="middle" class="small">prompt generation</text>
  <rect x="465" y="840" width="300" height="96" class="tts"/>
  <text x="615" y="872" text-anchor="middle" class="label">TTS Rendering / Voice Output</text>
  <text x="615" y="898" text-anchor="middle" class="small">spoken guidance, status,</text>
  <text x="615" y="918" text-anchor="middle" class="small">warning, and next-input prompts</text>
  <rect x="915" y="290" width="300" height="96" class="box"/>
  <text x="1065" y="322" text-anchor="middle" class="label">Policy Router +</text>
  <text x="1065" y="342" text-anchor="middle" class="label">Deterministic Validator</text>
  <text x="1065" y="364" text-anchor="middle" class="small">deterministic routing and</text>
  <text x="1065" y="380" text-anchor="middle" class="small">final admissibility boundary</text>
  <rect x="915" y="470" width="300" height="106" class="safe"/>
  <text x="1065" y="502" text-anchor="middle" class="label">Approved Low-Risk</text>
  <text x="1065" y="522" text-anchor="middle" class="label">Actuation Path</text>
  <text x="1065" y="548" text-anchor="middle" class="small">Class 1 bounded execution</text>
  <text x="1065" y="568" text-anchor="middle" class="small">currently lighting only</text>
  <rect x="915" y="650" width="300" height="126" class="critical"/>
  <text x="1065" y="682" text-anchor="middle" class="label">Safe Deferral and</text>
  <text x="1065" y="702" text-anchor="middle" class="label">Clarification Management</text>
  <text x="1065" y="728" text-anchor="middle" class="small">deferred state, unresolved</text>
  <text x="1065" y="748" text-anchor="middle" class="small">reason, and clarification-needed</text>
  <rect x="915" y="848" width="300" height="88" class="critical"/>
  <text x="1065" y="880" text-anchor="middle" class="label">Caregiver Escalation</text>
  <text x="1065" y="906" text-anchor="middle" class="small">manual confirmation path for</text>
  <text x="1065" y="926" text-anchor="middle" class="small">sensitive actuation</text>

  <rect x="465" y="980" width="750" height="70" class="box"/>
  <text x="840" y="1012" text-anchor="middle" class="label">Local ACK + Audit Logging</text>
  <text x="840" y="1038" text-anchor="middle" class="small">shared lower layer for processed hub-side outcomes</text>

  <rect x="1270" y="848" width="235" height="88" class="critical"/>
  <text x="1387.5" y="880" text-anchor="middle" class="label">Caregiver Approval</text>
  <text x="1387.5" y="906" text-anchor="middle" class="small">approval or denial for</text>
  <text x="1387.5" y="926" text-anchor="middle" class="small">governed manual dispatch</text>

  <line x1="440" y1="1080" x2="1500" y2="1080" class="divider"/>
  <text x="970" y="1115" text-anchor="middle" class="section">Mac mini Edge Hub</text>
  <text x="970" y="1140" text-anchor="middle" class="tiny">local LLM reasoning, policy-constrained control, TTS rendering, caregiver approval handling, ACK handling, and local audit</text>

  <path d="M215 178 V290" class="arrow"/>
  <path d="M345 322 H465" class="arrow"/>
  <path d="M345 525 H375 V525 H395 V342 H465" class="arrow"/>
  <path d="M345 708 H410 V354 H465" class="arrow emergency" marker-end="url(#arrowhead_em)"/>
  <path d="M615 386 V470" class="arrow"/>
  <path d="M765 318 H845 V318 H915" class="arrow emergency" marker-end="url(#arrowhead_em)"/>
  <path d="M615 580 V650" class="arrow llm" marker-end="url(#arrowhead_llm)"/>
  <path d="M765 713 H790 V338 H915" class="arrow llm" marker-end="url(#arrowhead_llm)"/>
  <path d="M1065 386 V470" class="arrow branch" marker-end="url(#arrowhead_branch)"/>
  <path d="M1215 338 H1235 V713 H1215" class="arrow branch" marker-end="url(#arrowhead_branch)"/>
  <path d="M1215 354 H1240 V877 H1215" class="arrow branch" marker-end="url(#arrowhead_branch)"/>

  <path d="M915 495 H820 V800 H400 V888 H345" class="arrow exec" marker-end="url(#arrowhead_exec)"/>
  <path d="M1215 892 H1245 V892 H1270" class="arrow exec" marker-end="url(#arrowhead_exec)"/>
  <path d="M1270 908 H1248 V952 H400 V904 H345" class="arrow exec" marker-end="url(#arrowhead_exec)"/>

  <path d="M915 545 H850 V860 H765" class="arrow ttsflow" marker-end="url(#arrowhead_tts)"/>
  <path d="M915 687 H860 V888 H765" class="arrow ttsflow" marker-end="url(#arrowhead_tts)"/>
  <path d="M915 906 H780 V904 H765" class="arrow ttsflow" marker-end="url(#arrowhead_tts)"/>

  <path d="M215 936 V1015 H465" class="arrow ack" marker-end="url(#arrowhead_ack)"/>
  <path d="M1387.5 936 V1015 H1215" class="arrow ack" marker-end="url(#arrowhead_ack)"/>
  <path d="M915 729 H900 V980" class="arrow ack" marker-end="url(#arrowhead_ack)"/>

  <rect x="60" y="1195" width="1530" height="24" class="box"/>
  <text x="825" y="1212" text-anchor="middle" class="tiny">Raspberry Pi support is non-authoritative; operational control, validation, caregiver-mediated execution, ACK handling, and audit remain on the Mac mini edge hub.</text>
</svg>
