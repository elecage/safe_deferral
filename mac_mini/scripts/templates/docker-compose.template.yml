services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: edge_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./volumes/mosquitto/config:/mosquitto/config
      - ./volumes/mosquitto/data:/mosquitto/data
      - ./volumes/mosquitto/log:/mosquitto/log

  homeassistant:
    image: lscr.io/linuxserver/homeassistant:latest
    container_name: edge_homeassistant
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=Asia/Seoul
    volumes:
      - ./volumes/homeassistant/config:/config

  ollama:
    image: ollama/ollama:latest
    container_name: edge_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./volumes/ollama/data:/root/.ollama

  edge_controller_app:
    build:
      context: ${SAFE_DEFERRAL_REPO_ROOT}
      dockerfile: mac_mini/code/Dockerfile
    container_name: edge_controller_app
    restart: unless-stopped
    depends_on:
      - mosquitto
      - ollama
    env_file:
      - ./.env
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - OLLAMA_HOST=http://ollama:11434
      - POLICY_DIR=/app/config/policies
      - SCHEMA_DIR=/app/config/schemas
      - MQTT_REGISTRY_DIR=/app/config/mqtt
      - PAYLOAD_EXAMPLES_DIR=/app/config/payloads
      - SQLITE_PATH=/app/db/audit_log.db
    volumes:
      - ./volumes/app/config/policies:/app/config/policies:ro
      - ./volumes/app/config/schemas:/app/config/schemas:ro
      - ./volumes/app/config/mqtt:/app/config/mqtt:ro
      - ./volumes/app/config/payloads:/app/config/payloads:ro
      - ./volumes/sqlite/db:/app/db
